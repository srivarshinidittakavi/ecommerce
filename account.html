<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanCart - My Account</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (same as index.html) -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-left">
                    <a href="index.html" class="logo">UrbanCart</a>
                    <ul class="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="shop.html">Shop</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <a href="account.html" class="active"><i class="fas fa-user"></i></a>
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Account Section -->
    <section class="account-section">
        <div class="account-container">
            <h1 class="page-title">My Account</h1>
            
            <div class="account-tabs">
                <button class="tab-btn active" onclick="switchTab('profile')">Profile</button>
                <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
                <button class="tab-btn" onclick="switchTab('wishlist')">Wishlist</button>
                <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
            </div>
            
            <div class="tab-content active" id="profile-tab">
                <div class="profile-info">
                    <div class="profile-avatar">
                        <img src="https://via.placeholder.com/150x150" alt="Profile">
                        <button class="btn btn-secondary">Change Photo</button>
                    </div>
                    
                    <div class="profile-details">
                        <h3>John Doe</h3>
                        <p>john.doe@example.com</p>
                        <p>Member since: January 2024</p>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="orders-tab">
                <h3>Order History</h3>
                <div class="orders-list">
                    <!-- Orders will be loaded here -->
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Order #12345</span>
                            <span class="order-date">January 15, 2024</span>
                            <span class="order-status delivered">Delivered</span>
                        </div>
                        <div class="order-items">
                            <div class="order-item">
                                <img src="https://via.placeholder.com/50x50" alt="Product">
                                <div class="item-details">
                                    <h4>Product Name</h4>
                                    <p>Quantity: 2</p>
                                    <p>$199.98</p>
                                </div>
                            </div>
                        </div>
                        <div class="order-footer">
                            <span>Total: $199.98</span>
                            <button class="btn btn-text">View Details</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="wishlist-tab">
                <h3>My Wishlist</h3>
                <div class="product-grid" id="wishlist-products">
                    <!-- Wishlist products will be loaded here -->
                </div>
            </div>
            
            <div class="tab-content" id="settings-tab">
                <h3>Account Settings</h3>
                <form class="settings-form">
                    <div class="form-group">
                        <label for="display-name">Display Name</label>
                        <input type="text" id="display-name" value="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="account-email">Email</label>
                        <input type="email" id="account-email" value="john.doe@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password">
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password">
                    </div>
                    
                    <button class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer (same as index.html) -->
    <footer>
        <!-- Same footer as index.html -->
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
