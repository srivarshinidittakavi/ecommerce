<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanCart - Product Details</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (same as index.html) -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-left">
                    <a href="index.html" class="logo">UrbanCart</a>
                    <ul class="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="shop.html">Shop</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <a href="account.html"><i class="fas fa-user"></i></a>
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Product Details -->
    <section class="product-details">
        <div class="product-container">
            <div class="product-images">
                <div class="main-image">
                    <img src="https://via.placeholder.com/500x500" alt="Product" id="main-product-image">
                </div>
                <div class="thumbnail-images">
                    <img src="https://via.placeholder.com/100x100" alt="Thumbnail 1" class="thumbnail active">
                    <img src="https://via.placeholder.com/100x100" alt="Thumbnail 2" class="thumbnail">
                    <img src="https://via.placeholder.com/100x100" alt="Thumbnail 3" class="thumbnail">
                    <img src="https://via.placeholder.com/100x100" alt="Thumbnail 4" class="thumbnail">
                </div>
            </div>
            
            <div class="product-info">
                <h1 id="product-title">Product Name</h1>
                <div class="product-rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star-half-alt"></i>
                    <span>(120 reviews)</span>
                </div>
                <div class="product-price" id="product-price">$99.99</div>
                <p class="product-description" id="product-description">
                    This is a great product with amazing features. Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                </p>
                
                <div class="product-options">
                    <div class="size-selector">
                        <label for="size">Size:</label>
                        <select id="size">
                            <option value="s">Small</option>
                            <option value="m">Medium</option>
                            <option value="l">Large</option>
                            <option value="xl">X-Large</option>
                        </select>
                    </div>
                    
                    <div class="color-selector">
                        <label>Color:</label>
                        <div class="color-options">
                            <span class="color-option" style="background: #000;" data-color="black"></span>
                            <span class="color-option" style="background: #f00;" data-color="red"></span>
                            <span class="color-option" style="background: #00f;" data-color="blue"></span>
                            <span class="color-option" style="background: #0f0;" data-color="green"></span>
                        </div>
                    </div>
                    
                    <div class="quantity-selector">
                        <label for="quantity">Quantity:</label>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="decrementQuantity()">-</button>
                            <input type="number" id="quantity" value="1" min="1" max="10">
                            <button class="quantity-btn" onclick="incrementQuantity()">+</button>
                        </div>
                    </div>
                </div>
                
                <div class="product-actions">
                    <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
                    <button class="btn btn-secondary" onclick="buyNow()">Buy Now</button>
                    <button class="wishlist-btn"><i class="far fa-heart"></i></button>
                </div>
                
                <div class="product-meta">
                    <p><strong>Category:</strong> <span id="product-category">Electronics</span></p>
                    <p><strong>Availability:</strong> <span class="in-stock">In Stock</span></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Related Products -->
    <section class="related-products">
        <h2 class="section-title">Related Products</h2>
        <div class="product-grid" id="related-products">
            <!-- Related products will be loaded here -->
        </div>
    </section>

    <!-- Footer (same as index.html) -->
    <footer>
        <!-- Same footer as index.html -->
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
