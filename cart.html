<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanCart - Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (same as index.html) -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-left">
                    <a href="index.html" class="logo">UrbanCart</a>
                    <ul class="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="shop.html">Shop</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <a href="account.html"><i class="fas fa-user"></i></a>
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count">0</span>
                    </a>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="cart-container">
            <h1 class="page-title">Shopping Cart</h1>
            
            <div class="cart-wrapper">
                <div class="cart-items">
                    <div class="cart-header">
                        <div class="cart-header-product">Product</div>
                        <div class="cart-header-price">Price</div>
                        <div class="cart-header-quantity">Quantity</div>
                        <div class="cart-header-total">Total</div>
                        <div class="cart-header-action"></div>
                    </div>
                    
                    <div id="cart-items-list">
                        <!-- Cart items will be loaded here -->
                    </div>
                    
                    <div class="cart-actions">
                        <a href="shop.html" class="btn btn-secondary">Continue Shopping</a>
                        <button class="btn btn-text" onclick="clearCart()">Clear Cart</button>
                    </div>
                </div>
                
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>Shipping:</span>
                        <span id="shipping">$5.99</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>Tax:</span>
                        <span id="tax">$0.00</span>
                    </div>
                    
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                    
                    <div class="promo-code">
                        <input type="text" placeholder="Enter promo code" id="promo-input">
                        <button class="btn btn-secondary" onclick="applyPromo()">Apply</button>
                    </div>
                    
                    <a href="checkout.html" class="btn btn-primary checkout-btn">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (same as index.html) -->
    <footer>
        <!-- Same footer as index.html -->
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
